<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>GymLog</title>
<meta name="description" content="Personal gym & body weight tracker">
<meta name="theme-color" content="#0c0e12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymLog">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="stylesheet" href="style.css?v=11">
</head>
<body>
<div id="app"><div style="padding-top:42vh;text-align:center;font-size:2.2rem">🏋️</div></div>

<nav id="tabbar">
  <button data-tab="home" aria-label="Home">
    <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    <span>Home</span>
  </button>
  <button data-tab="plan" aria-label="Plan">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 11h18"/></svg>
    <span>Plan</span>
  </button>
  <button data-tab="workout" class="start" aria-label="Start workout">
    <span class="cir"><svg viewBox="0 0 24 24"><path d="M6.5 6.5v11M17.5 6.5v11M2.5 9.5v5M21.5 9.5v5M6.5 12h11"/></svg></span>
    <span>Start</span>
  </button>
  <button data-tab="stats" aria-label="Stats">
    <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg>
    <span>Stats</span>
  </button>
  <button data-tab="library" aria-label="Library">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <span>Exercises</span>
  </button>
</nav>

<div id="timer-root"></div>
<div id="modal-root"></div>
<div id="toast"></div>

<script src="data.js?v=11"></script>
<script src="app.js?v=11"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220" role="img" aria-label="openGym — self-hosted gym & body-weight tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12151b"/>
      <stop offset="1" stop-color="#0c0e12"/>
    </linearGradient>
  </defs>
  <rect width="880" height="220" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="877" height="217" rx="22.5" fill="none" stroke="#2b3140" stroke-width="3"/>

  <!-- dumbbell mark -->
  <g transform="translate(112,110)" fill="#a3e635">
    <rect x="-72" y="-10" width="144" height="20" rx="7"/>
    <rect x="-80" y="-36" width="20" height="72" rx="7"/>
    <rect x="-104" y="-25" width="17" height="50" rx="7"/>
    <rect x="60"  y="-36" width="20" height="72" rx="7"/>
    <rect x="87"  y="-25" width="17" height="50" rx="7"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="250" y="102" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="76" font-weight="800" letter-spacing="-2.5">
    <tspan fill="#eef1f6">open</tspan><tspan fill="#a3e635">Gym</tspan>
  </text>
  <text x="253" y="146" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="25" font-weight="600" fill="#8b94a7">Self-hosted gym &amp; body-weight tracker</text>
  <text x="253" y="176" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="500" fill="#5c6475">passkey login  ·  own your data  ·  docker  ·  AGPL</text>
</svg>

name: Bug report
description: Something in openGym is broken or not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What did you do?
      description: Steps to reproduce, as precisely as you can.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
      description: Include error messages, console output, or screenshots if you have them.
    validations:
      required: true

  - type: dropdown
    id: setup
    attributes:
      label: How are you running openGym?
      options:
        - Self-hosted (docker compose)
        - Frontend dev server (npm run dev)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: e.g. Safari 17 on iOS 18, Chrome 126 on Android
    validations:
      required: true

  - type: checkboxes
    id: passkey
    attributes:
      label: Is this about login / passkeys?
      description: >
        Most login issues are an `RP_ID`/`ORIGIN` mismatch — check your `.env` against the
        domain you're accessing openGym from before reporting. See the
        [self-hosting guide](../../docs/SELF_HOSTING.md).
      options:
        - label: Yes, this is a login/passkey issue and I've already checked RP_ID/ORIGIN
